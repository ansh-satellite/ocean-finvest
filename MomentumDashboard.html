<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Finvest | Momentum Pro Dashboard</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-card: rgba(255, 255, 255, 0.08);
            --accent-green: #00e676;
            --accent-red: #ff5252;
            --accent-blue: #00b0ff;
            --text-primary: #e6edf3;
            --text-secondary: #8892b0;
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, #1a1f2c 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #0d1117 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, border 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(0, 230, 118, 0.2);
        }

        .upload-area {
            border: 2px dashed var(--border-card);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .upload-area:hover {
            border-color: var(--accent-green);
            background: rgba(0, 230, 118, 0.05);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            color: var(--accent-green);
            margin-bottom: 16px;
        }

        .heatmap-container {
            margin-bottom: 40px;
            overflow-x: auto;
        }

        .heatmap-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 4px;
            min-width: 800px;
        }

        .heatmap-table th {
            padding: 12px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .heatmap-table td {
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 80px;
        }

        .year-label {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .net-label {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stats-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-value {
            font-weight: 700;
            color: var(--text-primary);
        }

        .highlight-value {
            font-size: 1.6rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
            display: block;
            font-weight: 800;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent-green);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [portfolioData, setPortfolioData] = useState(null);
            const [benchmarkData, setBenchmarkData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                console.log("Files selected:", files.map(f => f.name));
                setLoading(true);
                setError(null);

                const readers = files.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (evt) => {
                            try {
                                const bstr = evt.target.result;
                                const wb = XLSX.read(bstr, { type: 'binary' });
                                const ws = wb.Sheets[wb.SheetNames[0]];
                                const raw = XLSX.utils.sheet_to_json(ws);
                                console.log(`Parsed ${file.name}:`, raw.length, "rows");
                                resolve({ name: file.name, data: raw });
                            } catch (err) {
                                console.error(`Error reading ${file.name}:`, err);
                                reject(err);
                            }
                        };
                        reader.onerror = (err) => reject(err);
                        reader.readAsBinaryString(file);
                    });
                });

                Promise.all(readers).then(results => {
                    let port = null;
                    let bench = null;

                    if (results.length === 1) {
                        // Single file is always the portfolio
                        port = processRawData(results[0].data, results[0].name);
                    } else {
                        results.forEach(res => {
                            const name = res.name.toLowerCase();
                            const processed = processRawData(res.data, res.name);
                            
                            // Benchmarks usually have "benchmark" or "index" or are specifically named index files
                            // If it has "nifty" but also "returns" or "results" or "stocks", it's likely the strategy
                            const isBenchmark = (name.includes('benchmark') || name.includes('index')) || 
                                              ((name.includes('nifty') || name.includes('nse500')) && 
                                               !name.includes('returns') && !name.includes('results') && !name.includes('stocks'));

                            if (isBenchmark && !bench) {
                                bench = processed;
                            } else if (!port) {
                                port = processed;
                            } else {
                                // Fallback
                                if (!bench) bench = processed;
                            }
                        });
                    }

                    if (port) {
                        console.log("Setting Portfolio Data");
                        setPortfolioData(port);
                        if (bench) setBenchmarkData(bench);
                    } else {
                        console.error("No valid portfolio data found.");
                        setError("Could not find valid portfolio data. Please ensure your strategy file contains 'Date' and 'Buy_Hold_Value' columns.");
                    }
                    setLoading(false);
                }).catch(err => {
                    console.error("Upload Promise.all error:", err);
                    setError("Failed to parse files. Please ensure they are valid Excel files.");
                    setLoading(false);
                });
            };

            const processRawData = (rawData, fileName) => {
                console.log(`Processing ${fileName}...`);
                const dateMap = {};
                
                // Helper to find column by name (case-insensitive)
                const findCol = (row, names) => {
                    const keys = Object.keys(row);
                    for (const n of names) {
                        const match = keys.find(k => k.toLowerCase().trim() === n.toLowerCase());
                        if (match) return row[match];
                    }
                    return null;
                };

                rawData.forEach((row, idx) => {
                    const dStr = findCol(row, ['Date', 'DATE', 'Selection_Date', 'date', 'Day']);
                    let val = findCol(row, ['Buy_Hold_Value', 'Total_Portfolio_Value', 'value', 'Close', 'Price', 'Balance', 'NAV']);
                    
                    if (dStr === null || val === null) return;
                    
                    // Clean value: remove currency symbols and commas
                    if (typeof val === 'string') {
                        val = val.replace(/[^\d.-]/g, '');
                    }
                    const parsedVal = parseFloat(val);
                    if (isNaN(parsedVal)) return;

                    let date;
                    try {
                        if (typeof dStr === 'number') {
                            date = new Date((dStr - 25569) * 86400 * 1000);
                        } else {
                            date = new Date(dStr);
                        }
                        
                        if (isNaN(date.getTime()) && typeof dStr === 'string') {
                            const parts = dStr.split(/[-/.]/);
                            if (parts.length === 3) {
                                const d = parseInt(parts[0]);
                                const m = parseInt(parts[1]);
                                const y = parseInt(parts[2]);
                                if (d > 31) { // Assume YYYY-MM-DD
                                    date = new Date(d, m - 1, y);
                                } else { // Assume DD-MM-YYYY
                                    date = new Date(y, m - 1, d);
                                }
                            }
                        }
                    } catch (e) { return; }

                    if (!date || isNaN(date.getTime())) return;
                    
                    const dKey = date.toISOString().split('T')[0];
                    if (!dateMap[dKey]) dateMap[dKey] = 0;
                    dateMap[dKey] += parsedVal;
                });

                const dailyValues = Object.entries(dateMap)
                    .map(([date, value]) => ({ date, value }))
                    .sort((a, b) => new Date(a.date) - new Date(b.date));

                console.log(`${fileName} Result:`, dailyValues.length, "daily data points");

                if (dailyValues.length === 0) return null;

                const initialValue = dailyValues[0].value;
                const finalValue = dailyValues[dailyValues.length - 1].value;
                const netProfit = finalValue - initialValue;

                const monthlyData = {};
                dailyValues.forEach(dv => {
                    const dateObj = new Date(dv.date);
                    const ym = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                    if (!monthlyData[ym]) monthlyData[ym] = [];
                    monthlyData[ym].push(dv);
                });

                const monthEndValues = Object.entries(monthlyData).map(([ym, vals]) => ({
                    ym,
                    value: vals[vals.length - 1].value,
                    year: parseInt(ym.split('-')[0]),
                    month: parseInt(ym.split('-')[1])
                })).sort((a, b) => a.ym.localeCompare(b.ym));

                const years = [...new Set(monthEndValues.map(m => m.year))].sort();
                const heatmap = {};
                years.forEach(y => { heatmap[y] = Array(13).fill(0); });

                monthEndValues.forEach((m, idx) => {
                    let prevValue = initialValue;
                    if (idx > 0) {
                        prevValue = monthEndValues[idx-1].value;
                    } else {
                        prevValue = monthlyData[m.ym][0].value;
                    }
                    heatmap[m.year][m.month - 1] = m.value - prevValue;
                });

                years.forEach(y => {
                    heatmap[y][12] = heatmap[y].slice(0, 12).reduce((a, b) => a + b, 0);
                });

                const dailyReturns = [];
                let profitDays = 0;
                let lossDays = 0;
                let drawdowns = [];
                let peak = dailyValues[0].value;

                for (let i = 1; i < dailyValues.length; i++) {
                    const ret = dailyValues[i].value - dailyValues[i-1].value;
                    dailyReturns.push(ret);
                    if (ret > 0) profitDays++;
                    else if (ret < 0) lossDays++;

                    if (dailyValues[i].value > peak) peak = dailyValues[i].value;
                    drawdowns.push(dailyValues[i].value - peak);
                }

                const top5DD = drawdowns.filter(d => d < 0).sort((a, b) => a - b).slice(0, 5);
                const avgTop5DD = top5DD.length > 0 ? top5DD.reduce((a, b) => a + b, 0) / top5DD.length : 0;

                const top5LD = dailyReturns.filter(r => r < 0).sort((a, b) => a - b).slice(0, 5);
                const avgTop5LD = top5LD.length > 0 ? top5LD.reduce((a, b) => a + b, 0) / top5LD.length : 0;

                const uniqueTrades = new Set();
                rawData.forEach(row => {
                    const ticker = findCol(row, ['Ticker', 'SYMBOL', 'Symbol', 'ticker']);
                    const sDate = findCol(row, ['Selection_Date', 'Trade_Date', 'Entry_Date']);
                    if (ticker && sDate) {
                        uniqueTrades.add(`${ticker}_${sDate}`);
                    }
                });

                return {
                    dailyValues,
                    heatmap,
                    years,
                    metrics: {
                        startDate: dailyValues[0].date,
                        endDate: dailyValues[dailyValues.length - 1].date,
                        totalTrades: uniqueTrades.size > 0 ? uniqueTrades.size : rawData.length,
                        totalDays: dailyValues.length,
                        totalMonths: monthEndValues.length,
                        profitDays,
                        lossDays,
                        netProfit,
                        avgYearlyProfit: netProfit / (dailyValues.length / 252),
                        avgMonthlyProfit: netProfit / monthEndValues.length,
                        medianMonthlyProfit: calculateMedian(monthEndValues.map((m, i) => m.value - (i > 0 ? monthEndValues[i-1].value : initialValue))),
                        avgWeeklyProfit: netProfit / (dailyValues.length / 5),
                        avgTradesPerDay: (uniqueTrades.size > 0 ? uniqueTrades.size : rawData.length) / dailyValues.length,
                        avgTop5DD,
                        avgTop5LD,
                        sortinoRatio: calculateSortino(dailyReturns)
                    }
                };
            };

            const calculateMedian = (arr) => {
                if (arr.length === 0) return 0;
                const s = [...arr].sort((a, b) => a - b);
                const mid = Math.floor(s.length / 2);
                return s.length % 2 !== 0 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
            };

            const calculateSortino = (returns) => {
                if (returns.length === 0) return 0;
                const avg = returns.reduce((a, b) => a + b, 0) / returns.length;
                const downside = returns.filter(r => r < 0).map(r => r * r);
                if (downside.length === 0) return 0;
                const downsideDev = Math.sqrt(downside.reduce((a, b) => a + b, 0) / returns.length);
                return downsideDev === 0 ? 0 : (avg / downsideDev) * Math.sqrt(252);
            };

            const getCellColor = (val) => {
                if (val === 0) return 'transparent';
                const opacity = Math.min(Math.abs(val) / 200000, 1) * 0.7 + 0.3;
                return val > 0 
                    ? `rgba(0, 230, 118, ${opacity})` 
                    : `rgba(255, 82, 82, ${opacity})`;
            };

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-IN', {
                    style: 'currency',
                    currency: 'INR',
                    maximumFractionDigits: 0
                }).format(val);
            };

            useEffect(() => {
                if (portfolioData && window.Plotly) {
                    const traces = [
                        {
                            x: portfolioData.dailyValues.map(v => v.date),
                            y: portfolioData.dailyValues.map(v => v.value),
                            name: 'Portfolio Value',
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: '#00e676', width: 3 }
                        }
                    ];

                    if (benchmarkData) {
                        const startRatio = portfolioData.dailyValues[0].value / benchmarkData.dailyValues[0].value;
                        traces.push({
                            x: benchmarkData.dailyValues.map(v => v.date),
                            y: benchmarkData.dailyValues.map(v => v.value * startRatio),
                            name: 'Benchmark (Normalized)',
                            type: 'scatter',
                            mode: 'lines',
                            line: { color: '#ff5252', width: 2, dash: 'dot' }
                        });
                    }

                    Plotly.newPlot('chart', traces, {
                        paper_bgcolor: 'rgba(0,0,0,0)',
                        plot_bgcolor: 'rgba(0,0,0,0)',
                        font: { color: '#e6edf3' },
                        margin: { t: 20, r: 20, l: 60, b: 40 },
                        xaxis: { gridcolor: 'rgba(255,255,255,0.05)', color: '#8892b0' },
                        yaxis: { gridcolor: 'rgba(255,255,255,0.05)', color: '#8892b0' },
                        legend: { orientation: 'h', y: -0.2, font: { color: '#e6edf3' } }
                    }, { responsive: true, displayModeBar: false });
                }
            }, [portfolioData, benchmarkData]);

            return (
                <div className="container fade-in">
                    <header>
                        <h1>Ocean Finvest</h1>
                        <p className="subtitle">Premium Momentum Portfolio Analytics</p>
                    </header>

                    {!portfolioData && (
                        <div className="glass-card fade-in">
                            <label className="upload-area">
                                <input type="file" multiple hidden onChange={handleFileUpload} accept=".xlsx, .xls" />
                                <div className="upload-icon-container">
                                    <svg className="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                </div>
                                <p style={{fontSize: '1.25rem', marginBottom: '8px', fontWeight: '600'}}>
                                    {loading ? "Processing Strategy..." : "Upload Strategy & Benchmark Files"}
                                </p>
                                <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>
                                    Drop your momentum result and "Nifty 500" benchmark file
                                </p>
                                {loading && <div className="loader" style={{marginTop: '20px'}}></div>}
                            </label>
                            {error && <p style={{color: 'var(--accent-red)', marginTop: '10px', textAlign: 'center'}}>{error}</p>}
                        </div>
                    )}

                    {portfolioData && (
                        <>
                            <div className="heatmap-container glass-card fade-in">
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px'}}>
                                    <h3>Monthly Breakup</h3>
                                    <div style={{fontSize: '0.8rem', color: 'var(--text-secondary)', background: 'rgba(255,255,255,0.05)', padding: '6px 16px', borderRadius: '20px'}}>
                                        Values in absolute INR
                                    </div>
                                </div>
                                <table className="heatmap-table">
                                    <thead>
                                        <tr>
                                            <th>Year</th>
                                            {['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Net'].map(m => (
                                                <th key={m}>{m}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {portfolioData.years.map(year => (
                                            <tr key={year}>
                                                <td className="year-label">{year}</td>
                                                {portfolioData.heatmap[year].map((val, i) => (
                                                    <td 
                                                        key={i} 
                                                        style={{ 
                                                            backgroundColor: getCellColor(val),
                                                            color: i === 12 ? '#fff' : (Math.abs(val) > 150000 ? '#0b0e14' : '#fff')
                                                        }}
                                                        className={i === 12 ? 'net-label' : ''}
                                                    >
                                                        {val === 0 ? '0' : Math.round(val).toLocaleString()}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="stats-grid">
                                <div className="glass-card stats-card fade-in" style={{animationDelay: '0.1s'}}>
                                    <div className="stat-item"><span className="stat-label">Start Date</span> <span className="stat-value">{portfolioData.metrics.startDate}</span></div>
                                    <div className="stat-item"><span className="stat-label">End Date</span> <span className="stat-value">{portfolioData.metrics.endDate}</span></div>
                                    <div className="stat-item"><span className="stat-label">Total Trades</span> <span className="stat-value">{portfolioData.metrics.totalTrades.toLocaleString()}</span></div>
                                    <div className="stat-item"><span className="stat-label">Total Days</span> <span className="stat-value">{portfolioData.metrics.totalDays}</span></div>
                                    <div className="stat-item"><span className="stat-label">Total Months</span> <span className="stat-value">{portfolioData.metrics.totalMonths}</span></div>
                                    <div className="stat-item"><span className="stat-label">Profit Days</span> <span className="stat-value" style={{color: 'var(--accent-green)'}}>{portfolioData.metrics.profitDays}</span></div>
                                    <div className="stat-item"><span className="stat-label">Loss Days</span> <span className="stat-value" style={{color: 'var(--accent-red)'}}>{portfolioData.metrics.lossDays}</span></div>
                                </div>

                                <div className="glass-card stats-card fade-in" style={{animationDelay: '0.2s'}}>
                                    <span className="stat-label">Net Profit</span>
                                    <span className="highlight-value" style={{color: portfolioData.metrics.netProfit > 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                                        {formatCurrency(portfolioData.metrics.netProfit)}
                                    </span>
                                    <div className="stat-item"><span className="stat-label">Avg Yearly Profit</span> <span className="stat-value">{formatCurrency(portfolioData.metrics.avgYearlyProfit)}</span></div>
                                    <div className="stat-item"><span className="stat-label">Avg Monthly Profit</span> <span className="stat-value">{formatCurrency(portfolioData.metrics.avgMonthlyProfit)}</span></div>
                                    <div className="stat-item"><span className="stat-label">Median Monthly Profit</span> <span className="stat-value">{formatCurrency(portfolioData.metrics.medianMonthlyProfit)}</span></div>
                                    <div className="stat-item"><span className="stat-label">Avg Weekly Profit</span> <span className="stat-value">{formatCurrency(portfolioData.metrics.avgWeeklyProfit)}</span></div>
                                    <div className="stat-item"><span className="stat-label">Avg Trades Per Day</span> <span className="stat-value">{portfolioData.metrics.avgTradesPerDay.toFixed(2)}</span></div>
                                    <div className="stat-item"><span className="stat-label">Top 5 DD Avg</span> <span className="stat-value" style={{color: 'var(--accent-red)'}}>{Math.round(portfolioData.metrics.avgTop5DD).toLocaleString()}</span></div>
                                    <div className="stat-item"><span className="stat-label">Top 5 LD Avg</span> <span className="stat-value" style={{color: 'var(--accent-red)'}}>{Math.round(portfolioData.metrics.avgTop5LD).toLocaleString()}</span></div>
                                </div>

                                <div className="glass-card stats-card fade-in" style={{animationDelay: '0.3s'}}>
                                    <h4 style={{marginBottom: '15px', color: 'var(--accent-blue)'}}>Alpha & Risk</h4>
                                    {benchmarkData ? (
                                        <>
                                            <div className="stat-item">
                                                <span className="stat-label">Portfolio Return</span> 
                                                <span className="stat-value" style={{color: 'var(--accent-green)'}}>{((portfolioData.metrics.netProfit / portfolioData.dailyValues[0].value) * 100).toFixed(2)}%</span>
                                            </div>
                                            <div className="stat-item">
                                                <span className="stat-label">Benchmark Return</span> 
                                                <span className="stat-value" style={{color: 'var(--accent-red)'}}>{((benchmarkData.metrics.netProfit / benchmarkData.dailyValues[0].value) * 100).toFixed(2)}%</span>
                                            </div>
                                            <div className="stat-item" style={{background: 'rgba(0,230,118,0.1)', padding: '14px', borderRadius: '12px', marginTop: '12px', border: '1px solid rgba(0,230,118,0.2)'}}>
                                                <span className="stat-label" style={{color: '#fff', fontWeight: '700'}}>🔥 Alpha</span> 
                                                <span className="stat-value" style={{color: 'var(--accent-green)', fontSize: '1.4rem'}}>
                                                    {(((portfolioData.metrics.netProfit / portfolioData.dailyValues[0].value) - (benchmarkData.metrics.netProfit / benchmarkData.dailyValues[0].value)) * 100).toFixed(2)}%
                                                </span>
                                            </div>
                                        </>
                                    ) : (
                                        <div style={{background: 'rgba(255,255,255,0.05)', padding: '16px', borderRadius: '12px', marginBottom: '16px'}}>
                                            <p style={{color: 'var(--text-secondary)', fontSize: '0.85rem'}}>Upload "Nifty 500" data to unlock Alpha comparison.</p>
                                        </div>
                                    )}
                                    <div className="stat-item" style={{marginTop: '12px'}}>
                                        <span className="stat-label">Monthly Sortino Ratio</span> 
                                        <span className="stat-value">{portfolioData.metrics.sortinoRatio.toFixed(3)}</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">DRR Ratio</span> 
                                        <span className="stat-value">{(Math.abs(portfolioData.metrics.netProfit / portfolioData.metrics.avgTop5DD)).toFixed(2)}</span>
                                    </div>
                                </div>

                                <div className="glass-card stats-card fade-in" style={{animationDelay: '0.4s'}}>
                                    <h4 style={{marginBottom: '15px', color: 'var(--accent-blue)'}}>NAV Trend Chart</h4>
                                    <div id="chart" style={{height: '280px'}}></div>
                                </div>
                            </div>

                            <div style={{display: 'flex', gap: '20px', marginBottom: '60px'}}>
                                <button 
                                    onClick={() => { setPortfolioData(null); setBenchmarkData(null); }} 
                                    className="glass-card"
                                    style={{padding: '14px 28px', cursor: 'pointer', color: 'var(--text-secondary)', fontWeight: '600'}}
                                >
                                    Reset All Data
                                </button>
                                <button 
                                    onClick={() => window.print()} 
                                    className="glass-card"
                                    style={{padding: '14px 28px', cursor: 'pointer', color: 'var(--accent-green)', borderColor: 'var(--accent-green)', fontWeight: '700'}}
                                >
                                    Download Report (PDF)
                                </button>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
